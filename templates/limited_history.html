<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CollectIQ — 限量卡機歷史</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family:-apple-system,"Segoe UI","Noto Sans TC",sans-serif; margin:0; background:#0d1117; color:#e6edf3; }
    header { padding:20px 28px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; background:#161b22; border-bottom:1px solid #30363d; }
    h1 { margin:0; font-size:22px; font-weight:800; }
    .sub { color:#8b949e; font-size:12px; margin-top:3px; }
    nav { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
    nav a { padding:5px 12px; border-radius:6px; border:1px solid transparent; color:#58a6ff; text-decoration:none; font-size:13px; }
    nav a:hover { text-decoration:underline; }
    main { padding:22px 28px; max-width:820px; }
    .bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .muted { color:#8b949e; font-size:13px; }
    select { background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:5px 10px; font-size:12px; }

    .timeline { position:relative; margin-left:8px; padding-left:24px; border-left:2px solid #21262d; }
    .ev { position:relative; margin-bottom:20px; }
    .ev::before { content:""; position:absolute; left:-31px; top:3px; width:12px; height:12px; border-radius:50%;
                  background:#0d1117; border:2px solid #58a6ff; }
    .ev.t-NEW_PACK::before   { border-color:#3fb950; }
    .ev.t-LIMITED_OPEN::before { border-color:#f0b429; }
    .ev.t-NEW_S_PULL::before { border-color:#bc8cff; }
    .ev .when { font-size:11px; color:#8b949e; font-variant-numeric:tabular-nums; }
    .ev .card-box { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px 16px; margin-top:5px; }
    .ev .title { font-size:15px; font-weight:700; }
    .tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:10px; margin-left:8px; vertical-align:middle; }
    .tag-NEW_PACK { background:#0d2f1c; color:#3fb950; }
    .tag-LIMITED_OPEN { background:#3a2d0a; color:#f0b429; }
    .tag-NEW_S_PULL { background:#2a1d3d; color:#bc8cff; }
    .ev .det { font-size:12px; color:#8b949e; margin-top:5px; }
    .ev .det b { color:#e6edf3; font-weight:600; }
    .empty { color:#8b949e; padding:30px 0; }

    @media (max-width:640px){
      header { padding:14px 14px; gap:10px; }
      h1 { font-size:19px; }
      main { padding:16px 12px; }
      nav a { font-size:12px; padding:4px 9px; }
      .timeline { padding-left:18px; }
      .ev::before { left:-25px; }
    }
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:26px;">🎰</span>
    <div><h1>限量卡機歷史</h1><div class="sub">每次偵測到的限量卡機開放 / 新增 / S 卡事件時間軸</div></div>
  </div>
  <nav>
    <a href="/">總覽</a>
    <a href="/live">🔴 Live Pool</a>
    <a href="/limited-history" style="border:1px solid #1f6feb;background:#1f6feb22;">🎰 限量歷史</a>
    <a href="/api-status">API 狀態</a>
  </nav>
</header>

<main>
  <div class="bar">
    <label class="muted">類型：</label>
    <select id="typeSel" onchange="render()">
      <option value="">全部</option>
      <option value="LIMITED_OPEN">限量開放</option>
      <option value="NEW_PACK">新卡機</option>
      <option value="NEW_S_PULL">抽出 S 卡</option>
    </select>
    <span class="muted" id="count"></span>
  </div>
  <div id="tl" class="timeline"></div>
</main>

<script>
let ALL = [];

function usd(n){ return n==null? null : "$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }
function whenTxt(iso){
  if(!iso) return "?";
  const d = new Date(iso);
  return d.toLocaleString("zh-Hant", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
}

function detail(e){
  const bits = [];
  if(e.remaining != null) bits.push(`剩 <b>${Number(e.remaining).toLocaleString()}</b> 張`);
  if(e.platform_ev_usd != null) bits.push(`官方EV <b>${usd(e.platform_ev_usd)}</b>`);
  if(e.card) bits.push(`S 卡：<b>${e.card}</b>`);
  if(e.slug) bits.push(`<span class="muted">${e.slug}</span>`);
  return bits.join(" · ");
}

function render(){
  const flt = document.getElementById("typeSel").value;
  const rows = flt ? ALL.filter(e => e.type === flt) : ALL;
  document.getElementById("count").textContent = `共 ${rows.length} 筆`;
  const tl = document.getElementById("tl");
  if(!rows.length){ tl.innerHTML = `<div class="empty">尚無限量卡機事件紀錄。</div>`; return; }
  tl.innerHTML = rows.map(e => `
    <div class="ev t-${e.type}">
      <div class="when">${whenTxt(e.iso)}</div>
      <div class="card-box">
        <div class="title">${e.name || e.slug || "?"}<span class="tag tag-${e.type}">${e.type_label||e.type}</span></div>
        ${detail(e) ? `<div class="det">${detail(e)}</div>` : ""}
      </div>
    </div>`).join("");
}

fetch("/api/limited-history").then(r => r.json()).then(d => {
  ALL = d.events || [];
  render();
}).catch(err => {
  document.getElementById("tl").innerHTML = `<div class="empty">載入失敗：${err}</div>`;
});
</script>
<script src="/static/i18n.js"></script>
</body>
</html>
