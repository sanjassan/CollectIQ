<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CollectIQ · RWA 指數</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--amber:#d29922;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5}
a{color:var(--blue);text-decoration:none}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav a{padding:4px 10px;border-radius:6px;font-size:12px;color:var(--muted);border:1px solid transparent}
.nav a:hover{border-color:var(--border);color:var(--text)}
.nav a.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.container{max-width:1200px;margin:0 auto;padding:20px}

.hero{text-align:center;padding:32px 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.hero h2{font-size:28px;font-weight:800;color:var(--amber)}
.hero p{color:var(--muted);margin-top:8px;font-size:14px}

.ip-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.ip-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s}
.ip-card:hover,.ip-card.active{border-color:var(--blue)}
.ip-card .ip-name{font-size:18px;font-weight:800}
.ip-card .ip-stat{font-size:12px;color:var(--muted);margin-top:4px}
.ip-card .ip-val{font-size:24px;font-weight:800;color:var(--purple);margin-top:8px}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters input{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;flex:1;min-width:200px}
.filters select{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}

.table-wrap{border:1px solid var(--border);border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-hint{display:none;font-size:11px;color:var(--muted);margin-bottom:6px}
.idx-table{width:100%;border-collapse:collapse;min-width:720px}
.idx-table th{text-align:left;padding:10px 12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--bg);cursor:pointer;white-space:nowrap}
.idx-table th:hover{color:var(--text)}
.idx-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
.idx-table tr:hover{background:rgba(88,166,255,.05)}
@media(max-width:640px){
  .container{padding:14px}
  .hero{padding:24px 14px}.hero h2{font-size:22px}
  .table-hint{display:block}
  .idx-table th,.idx-table td{padding:8px 10px;font-size:12px}
  .bar-label{width:110px!important}
  .bar-val{width:60px!important;font-size:11px!important}
}

.trust-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}

.bar-chart{margin:24px 0}
.bar-row{display:flex;align-items:center;margin-bottom:6px;gap:8px}
.bar-label{width:200px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.bar-track{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;color:#fff;font-weight:700}
.bar-val{width:80px;font-size:12px;font-weight:700;color:var(--text)}

.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.section h3{font-size:14px;font-weight:700;margin-bottom:14px}
</style>
</head>
<body>
  <div style="padding:16px 20px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:26px;">🔬</span>
      <div><h1 style="margin:0;font-size:22px;font-weight:800;">CollectIQ</h1><div style="color:#8b949e;font-size:12px;">RWA Price Verification Engine for Renaiss</div></div>
    </div>
    <nav style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
      <a href="/" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">總覽</a>
      <a href="/verify" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">價格驗證</a>
      <a href="/intelligence" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">Price Intel</a>
      <a href="/cdp" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">CDP 模擬</a>
      <a href="/rwa-index" style="color:#58a6ff;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid #1f6feb;background:#1f6feb22;">RWA 指數</a>
      <a href="/oracle" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">Oracle</a>
      <a href="/holdings" style="color:#c9d1d9;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid transparent;">鏈上持有</a>
    </nav>
  </div>

<div class="hero">
  <div style="font-size:48px">📈</div>
  <h2>RWA 收藏品指數</h2>
  <p>按系列追蹤價格分佈、驗證覆蓋率與信任分數 — 像追蹤股票指數一樣追蹤收藏品</p>
</div>

<div class="container">
  <!-- IP Summary Cards -->
  <div class="ip-cards" id="ipCards"></div>

  <!-- Top 10 Bar Chart -->
  <div class="section">
    <h3>📊 系列總市值排行 Top 10</h3>
    <div id="barChart"></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" id="searchInput" placeholder="搜尋系列名稱..." oninput="renderTable()"/>
    <select id="ipFilter" onchange="renderTable()">
      <option value="">全部 IP</option>
      <option value="Pokemon">Pokemon</option>
      <option value="One Piece">One Piece</option>
      <option value="Other">Other</option>
    </select>
    <select id="sortBy" onchange="renderTable()">
      <option value="cards">按卡片數排序</option>
      <option value="total_fmv">按總市值排序</option>
      <option value="trust_score">按信任分數排序</option>
      <option value="avg_delta">按平均偏差排序</option>
      <option value="coverage_pct">按覆蓋率排序</option>
    </select>
  </div>

  <!-- Index Table -->
  <div class="table-hint">← 表格可左右滑動查看全部欄位 →</div>
  <div class="table-wrap">
    <table class="idx-table">
      <thead>
        <tr>
          <th>系列名稱</th>
          <th>IP</th>
          <th>卡片數</th>
          <th>已驗證</th>
          <th>覆蓋率</th>
          <th>平均 FMV</th>
          <th>平均驗證價</th>
          <th>平均偏差</th>
          <th>信任分數</th>
          <th>總市值</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
let allIndices=[], ipSummary=[];

async function load(){
  try{
    const r=await fetch('/api/rwa-index');
    const d=await r.json();
    allIndices=d.indices||[];
    ipSummary=d.ip_summary||[];
    renderIPCards();
    renderBarChart();
    renderTable();
  }catch(e){
    document.getElementById('tableBody').innerHTML=`<tr><td colspan="10" style="text-align:center;color:var(--red)">${e.message}</td></tr>`;
  }
}

function renderIPCards(){
  const el=document.getElementById('ipCards');
  const colors={Pokemon:'var(--amber)',['One Piece']:'var(--red)',Other:'var(--blue)'};
  const icons={Pokemon:'⚡',['One Piece']:'🏴‍☠️',Other:'🃏'};
  el.innerHTML=ipSummary.map(ip=>`
    <div class="ip-card" onclick="document.getElementById('ipFilter').value='${ip.ip}';renderTable()">
      <div style="font-size:28px">${icons[ip.ip]||'🃏'}</div>
      <div class="ip-name" style="color:${colors[ip.ip]||'var(--text)'}">${ip.ip}</div>
      <div class="ip-stat">${ip.series} 系列 · ${ip.cards} 張 · ${ip.verified} 已驗證</div>
      <div class="ip-val">$${(ip.total_fmv).toLocaleString(undefined,{maximumFractionDigits:0})}</div>
    </div>
  `).join('');
}

function renderBarChart(){
  const top=allIndices.slice().sort((a,b)=>b.total_fmv-a.total_fmv).slice(0,10);
  const max=top[0]?top[0].total_fmv:1;
  const el=document.getElementById('barChart');
  el.innerHTML=top.map(idx=>{
    const pct=(idx.total_fmv/max*100).toFixed(1);
    const color=idx.ip==='Pokemon'?'var(--amber)':idx.ip==='One Piece'?'var(--red)':'var(--blue)';
    const short=idx.set_name.replace(/Pokemon Japanese /,'').replace(/Pokemon /,'');
    return `<div class="bar-row">
      <div class="bar-label" title="${idx.set_name}">${short}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${idx.cards}</div></div>
      <div class="bar-val">$${idx.total_fmv.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
    </div>`;
  }).join('');
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const ip=document.getElementById('ipFilter').value;
  const sortKey=document.getElementById('sortBy').value;

  let filtered=allIndices.filter(idx=>{
    if(q&&!idx.set_name.toLowerCase().includes(q)) return false;
    if(ip&&idx.ip!==ip) return false;
    return true;
  });

  filtered.sort((a,b)=>{
    const av=a[sortKey]??-1, bv=b[sortKey]??-1;
    return bv-av;
  });

  const el=document.getElementById('tableBody');
  el.innerHTML=filtered.map(idx=>{
    const trustColor=idx.trust_score==null?'var(--dim)':idx.trust_score>=70?'var(--green)':idx.trust_score>=50?'var(--amber)':'var(--red)';
    const trustBg=idx.trust_score==null?'transparent':idx.trust_score>=70?'rgba(63,185,80,.15)':idx.trust_score>=50?'rgba(210,153,34,.15)':'rgba(248,81,73,.15)';
    const deltaColor=idx.avg_delta==null?'var(--dim)':idx.avg_delta<=15?'var(--green)':idx.avg_delta<=30?'var(--amber)':'var(--red)';
    return `<tr>
      <td style="font-weight:600;max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${idx.set_name}">${idx.set_name}</td>
      <td>${idx.ip}</td>
      <td>${idx.cards}</td>
      <td>${idx.verified}</td>
      <td>${idx.coverage_pct}%</td>
      <td>$${idx.avg_fmv.toFixed(2)}</td>
      <td>${idx.avg_verified_price!=null?'$'+idx.avg_verified_price.toFixed(2):'—'}</td>
      <td style="color:${deltaColor}">${idx.avg_delta!=null?idx.avg_delta+'%':'—'}</td>
      <td><span class="trust-pill" style="color:${trustColor};background:${trustBg}">${idx.trust_score!=null?idx.trust_score+'%':'—'}</span></td>
      <td style="font-weight:700">$${idx.total_fmv.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
    </tr>`;
  }).join('');
}

load();
</script>
<script src="/static/i18n.js"></script>
</body>
</html>
